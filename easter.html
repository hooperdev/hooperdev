<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Easter!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 25%, #e1f5fe 50%, #dcedc8 75%, #fff9c4 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: 'Georgia', serif;
      overflow: hidden;
      cursor: none;
    }

    @media (hover: none) and (pointer: coarse) {
      body { cursor: auto; }
      #cursor { display: none; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .message h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      color: #c2185b;
      text-shadow: 3px 3px 0 #f48fb1, 5px 5px 0 rgba(0,0,0,0.1);
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
    }

    .message p {
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #7b1fa2;
      margin-top: 0.5em;
      font-style: italic;
      animation: pulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    /* Floating eggs */
    .egg {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: floatEgg linear infinite;
      opacity: 0.6;
    }

    @keyframes floatEgg {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Custom cursor dot */
    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-4px, -32px);
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.2));
      transition: opacity 0.2s;
    }

    /* Bunny */
    #bunny {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      font-size: 2rem;
      transition: left 0.18s cubic-bezier(.25,.8,.25,1), top 0.18s cubic-bezier(.25,.8,.25,1);
      transform: translate(-50%, -50%);
    }

    .bunny-svg {
      display: block;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.15));
    }

    /* Trail dots */
    .trail {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9997;
      animation: trailFade 0.6s forwards;
    }

    @keyframes trailFade {
      0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    }

    /* Spring flowers */
    .flower {
      position: fixed;
      pointer-events: none;
      font-size: 1.5rem;
      animation: bloomFade 1s forwards;
      z-index: 9996;
    }

    @keyframes bloomFade {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0deg); }
      40% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(180deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) rotate(360deg) translateY(-40px); }
    }
  </style>
</head>
<body>

  <div class="message">
    <h1>Happy Easter!</h1>
    <p>He is risen!</p>
  </div>

  <div id="cursor">🥕</div>
  <div id="bunny">
    <!-- Hopping pose (default) -->
    <svg id="bunny-hop" class="bunny-svg" width="48" height="60" viewBox="0 0 48 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="24" cy="42" rx="14" ry="16" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Head -->
      <ellipse cx="24" cy="24" rx="11" ry="10" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Left ear -->
      <ellipse cx="18" cy="8" rx="4" ry="10" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <ellipse cx="18" cy="8" rx="2" ry="7" fill="#f9c6cb"/>
      <!-- Right ear -->
      <ellipse cx="30" cy="8" rx="4" ry="10" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <ellipse cx="30" cy="8" rx="2" ry="7" fill="#f9c6cb"/>
      <!-- Eyes -->
      <circle cx="20" cy="22" r="1.8" fill="#4a4a6a"/>
      <circle cx="28" cy="22" r="1.8" fill="#4a4a6a"/>
      <circle cx="20.6" cy="21.4" r="0.6" fill="white"/>
      <circle cx="28.6" cy="21.4" r="0.6" fill="white"/>
      <!-- Nose -->
      <ellipse cx="24" cy="26" rx="1.5" ry="1" fill="#f9a8b0"/>
      <!-- Mouth -->
      <path d="M22 27.5 Q24 29 26 27.5" stroke="#c98a92" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Tail -->
      <circle cx="36" cy="50" r="5" fill="white" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Left foot -->
      <ellipse cx="16" cy="56" rx="7" ry="3.5" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Right foot -->
      <ellipse cx="30" cy="56" rx="7" ry="3.5" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
    </svg>

    <!-- Loaf pose (shown when catching the carrot) -->
    <svg id="bunny-loaf" class="bunny-svg" width="64" height="48" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
      <!-- Loaf body: wide, low, rounded -->
      <ellipse cx="32" cy="34" rx="22" ry="12" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Head sits forward on top of body -->
      <ellipse cx="20" cy="24" rx="12" ry="10" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Left ear flopped down-back -->
      <ellipse cx="10" cy="16" rx="3.5" ry="8" transform="rotate(-30 10 16)" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <ellipse cx="10" cy="16" rx="2" ry="5.5" transform="rotate(-30 10 16)" fill="#f9c6cb"/>
      <!-- Right ear flopped down-back -->
      <ellipse cx="22" cy="13" rx="3.5" ry="8" transform="rotate(10 22 13)" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <ellipse cx="22" cy="13" rx="2" ry="5.5" transform="rotate(10 22 13)" fill="#f9c6cb"/>
      <!-- Eyes half-closed (content/sleepy) -->
      <ellipse cx="16" cy="22" rx="2" ry="1.8" fill="#4a4a6a"/>
      <ellipse cx="24" cy="21" rx="2" ry="1.8" fill="#4a4a6a"/>
      <!-- Nose -->
      <ellipse cx="20" cy="26" rx="1.5" ry="1" fill="#f9a8b0"/>
      <!-- Happy munching mouth -->
      <path d="M18 27.5 Q20 29 22 27.5" stroke="#c98a92" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Carrot emoji held in mouth -->
      <foreignObject x="20" y="16" width="24" height="24">
        <span xmlns="http://www.w3.org/1999/xhtml" style="font-size:18px;line-height:1;">🥕</span>
      </foreignObject>
      <!-- Fluffy tail -->
      <circle cx="52" cy="34" r="6" fill="white" stroke="#e0d5cc" stroke-width="1"/>
      <!-- Tucked front paws (little bumps at bottom front) -->
      <ellipse cx="14" cy="43" rx="6" ry="3" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
      <ellipse cx="26" cy="45" rx="6" ry="3" fill="#f5f0eb" stroke="#e0d5cc" stroke-width="1"/>
    </svg>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const bunny = document.getElementById('bunny');
    const body = document.body;

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let bunnyX = mouseX;
    let bunnyY = mouseY;
    let hopOffset = 0;
    let hopAngle = 0;
    let lastX = mouseX;
    let trailCounter = 0;
    let flowerCounter = 0;
    let flipped = false;

    const trailColors = ['#f48fb1','#ce93d8','#90caf9','#a5d6a7','#fff176','#ffcc80'];
    const flowers = ['🌸','🌼','🌺','🌻','💐','🌷'];
    const eggs = ['🥚','🐣'];

    // Spawn floating eggs
    function spawnEgg() {
      const egg = document.createElement('div');
      egg.className = 'egg';
      egg.textContent = Math.random() < 0.3 ? '🐣' : '🥚';
      egg.style.left = Math.random() * 100 + 'vw';
      const duration = 6 + Math.random() * 8;
      egg.style.animationDuration = duration + 's';
      egg.style.animationDelay = Math.random() * duration + 's';
      egg.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
      body.appendChild(egg);
      setTimeout(() => egg.remove(), (duration * 2) * 1000);
    }

    for (let i = 0; i < 8; i++) spawnEgg();
    setInterval(spawnEgg, 3000);

    function handleMove(x, y) {
      mouseX = x;
      mouseY = y;

      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';

      // Trail
      trailCounter++;
      if (trailCounter % 3 === 0) {
        const trail = document.createElement('div');
        trail.className = 'trail';
        const size = 6 + Math.random() * 8;
        trail.style.width = size + 'px';
        trail.style.height = size + 'px';
        trail.style.left = mouseX + 'px';
        trail.style.top = mouseY + 'px';
        trail.style.background = trailColors[Math.floor(Math.random() * trailColors.length)];
        body.appendChild(trail);
        setTimeout(() => trail.remove(), 600);
      }

      // Flower on move trail
      flowerCounter++;
      if (flowerCounter % 20 === 0) {
        spawnFlower(mouseX, mouseY);
      }
    }

    document.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));

    document.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      handleMove(t.clientX, t.clientY);
      for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnFlower(t.clientX + (Math.random()-0.5)*40, t.clientY + (Math.random()-0.5)*40), i * 80);
      }
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      handleMove(t.clientX, t.clientY);
    }, { passive: false });

    document.addEventListener('click', (e) => {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnFlower(e.clientX + (Math.random()-0.5)*40, e.clientY + (Math.random()-0.5)*40), i * 80);
      }
    });

    function spawnFlower(x, y) {
      const flower = document.createElement('div');
      flower.className = 'flower';
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = x + 'px';
      flower.style.top = y + 'px';
      body.appendChild(flower);
      setTimeout(() => flower.remove(), 1000);
    }

    const bunnyHop = document.getElementById('bunny-hop');
    const bunnyLoaf = document.getElementById('bunny-loaf');

    // Bunny hop animation
    let hopPhase = 0;
    let isLoafing = false;
    let loafTimer = null;

    function setLoaf(loaf) {
      if (loaf === isLoafing) return;
      isLoafing = loaf;
      bunnyHop.style.display = loaf ? 'none' : 'block';
      bunnyLoaf.style.display = loaf ? 'block' : 'none';
      cursor.style.opacity = loaf ? '0' : '1';
    }

    function animateBunny() {
      const dx = mouseX - bunnyX;
      const dy = mouseY - bunnyY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Chase speed proportional to distance
      const speed = Math.min(0.05 + dist * 0.001, 0.10);
      bunnyX += dx * speed;
      bunnyY += dy * speed;

      // Catch threshold: bunny reaches the carrot
      if (dist < 30 && !isLoafing) {
        setLoaf(true);
        // Stay loafing for 2s then go back to hopping
        clearTimeout(loafTimer);
        loafTimer = setTimeout(() => setLoaf(false), 2000);
      } else if (dist > 80 && isLoafing) {
        // Carrot moved away — bunny chases again
        clearTimeout(loafTimer);
        setLoaf(false);
      }

      // Hop: bob up and down based on movement
      if (dist > 5 && !isLoafing) {
        hopPhase += 0.25;
      }
      const hopY = (dist > 5 && !isLoafing) ? Math.abs(Math.sin(hopPhase)) * -18 : 0;

      // Flip bunny if moving left
      if (dx < -2) flipped = true;
      if (dx > 2) flipped = false;

      bunny.style.left = bunnyX + 'px';
      bunny.style.top = (bunnyY + hopY) + 'px';
      bunny.style.transform = `translate(-50%, -50%) scaleX(${flipped ? -1 : 1})`;

      // Slight rotation while hopping (not while loafing)
      const tiltAngle = (dist > 5 && !isLoafing) ? Math.sin(hopPhase) * 8 : 0;
      const activeSvg = isLoafing ? bunnyLoaf : bunnyHop;
      activeSvg.style.transform = `rotate(${tiltAngle}deg)`;

      requestAnimationFrame(animateBunny);
    }

    animateBunny();
  </script>
</body>
</html>
